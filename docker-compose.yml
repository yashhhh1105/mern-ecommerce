services:

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile

    container_name: nginx

    ports:
      - "80:80"

    depends_on:
      - backend

  backend:
    build: ./backend

    container_name: backend

    expose:
      - "9000"

    env_file:
      - ./backend/.env

    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      - redis

  redis:
    image: redis:7-alpine

    container_name: redis

    command: redis-server --save 60 1 --loglevel warning

    volumes:
      - redis-data:/data

volumes:
  redis-data: