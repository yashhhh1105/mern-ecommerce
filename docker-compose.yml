version: "3.9"

services:
  frontend:
  build: ./frontend
  ports:
    - "80:80"
  depends_on:
    - backend

  backend:
  build: ./backend
  expose:
    - "5000"
  env_file:
    - .backend/.env
  environment:
    - REDIS_HOST=redis
    - MONGO_URL=mongodb://mongo:27017/Hivekart
  depends_on:
    - mongo
    - redis

mongo:
  image: mongo:7
  ports:
   - "27017:27017"
  volumes:
   - mongo-data:/data/db

redis:
  image: redis:7-alpine
  volumes:
   - redis-data:/data
  command: redis-server --save 60 1 --loglevel warning

volumes:
  mongo-data:
  redis-data: